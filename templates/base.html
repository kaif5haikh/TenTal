<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tental</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Tental</a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('home') }}">Home</a>
          <a class="nav-link" href="{{ url_for('browse') }}">Browse</a>
          <a class="nav-link" href="{{ url_for('login') }}">Login</a>
          <a class="nav-link" href="{{ url_for('register') }}">Register</a>
        </div>
      </div>
    </nav>

    <main class="flex-grow-1">{% block content %} {% endblock %}</main>

    <!-- Footer Section -->
    <footer id="footer-section" class="bg-dark text-white text-center py-4">
      <p class="mb-0">© 2026 Tental - Rent Anything, Anytime</p>
    </footer>
  </body>
</html>
