{% extends "base.html" %} {% block content %}

<div id="browse-page" class="container mt-5">
  <h1 id="browse-title" class="mb-4">Browse Rentals</h1>

  <div id="filter-section" class="row mb-4">
    <div class="col-md-4">
      <select id="category-filter" class="form-select">
        <option selected>All Categories</option>
        <option>Camping Gear</option>
        <option>Electronics</option>
        <option>Accommodation</option>
      </select>
    </div>
  </div>

  <form method="GET" class="mb-4">
    <div class="input-group">
      <input
        type="text"
        name="search"
        class="form-control"
        placeholder="Search tents, stoves, bags..."
        value="{{ request.args.get('search', '') }}"
      />

      <button type="submit" class="btn btn-primary">Search</button>
    </div>
  </form>
  <div id="rental-listings" class="row g-4">
    {% for rental in rentals %}

    <div class="col-md-4">
      <div class="card rental-card">
        {% if rental.image %}

        <img
          src="{{ url_for('static', filename='uploads/' + rental.image) }}"
          class="card-img-top"
          alt="{{ rental.title }}"
          style="height: 200px; object-fit: cover"
        />

        {% endif %}
        <div class="card-body">
          <a href="{{ url_for('main.listing_detail', id=rental.id) }}">
            <h5 class="rental-title">{{ rental.title }}</h5>
          </a>

          <p class="rental-price">₹{{ rental.price_per_day }}/day</p>

          <p>{{ rental.category }}</p>
        </div>
      </div>
    </div>

    {% endfor %}
  </div>
</div>

{% endblock %}
