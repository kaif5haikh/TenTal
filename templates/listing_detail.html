{% extends "base.html" %} {% block content %}

<div class="container mt-5">
  <div class="row">
    <div class="col-md-6">
      <img
        src="{{ url_for('static', filename='uploads/' + rental.image) }}"
        class="img-fluid rounded"
        style="height: 500px; width: 100%; object-fit: cover"
      />
    </div>

    <div class="col-md-6">
      <h1>{{ rental.title }}</h1>

      <p class="fs-4 text-success">₹{{ rental.price_per_day }}/day</p>

      <hr />

      <h5>Description</h5>

      <p>{{ rental.description }}</p>

      <h5>Category</h5>

      <p>{{ rental.category }}</p>

      <h5>Owner</h5>

      <p>{{ rental.owner.name }}</p>

      <h5>Contact</h5>

      <p>{{ rental.owner.email }}</p>
    </div>
  </div>
</div>

{% endblock %}
